<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-right" style="min-height:100vh; width:100%;">
    <div class="auth-form-wrap">
        <a href="index.html" class="auth-logo"><i class="bi bi-bug"></i> Issue Tracker</a>
        <h2>Set new password</h2>
        <p class="subtitle">Choose a strong password for your account.</p>
        <div id="alert-area"></div>
        <form id="form" novalidate>
            <div class="mb-3">
                <label class="form-label">New password</label>
                <input type="password" class="form-control" id="password" placeholder="At least 6 characters" required minlength="6">
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm password</label>
                <input type="password" class="form-control" id="confirm" placeholder="Same password again" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Reset password</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) { showAlert('alert-area', 'Invalid reset link.'); }

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        if (password !== document.getElementById('confirm').value) { showAlert('alert-area', 'Passwords do not match.'); return; }
        try {
            await apiFetch('/api/auth/reset-password', { method: 'POST', body: JSON.stringify({ token, newPassword: password }) });
            showAlert('alert-area', 'Password reset! Redirecting to login…', 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);
        } catch (err) { showAlert('alert-area', err.message); }
    });
</script>
</body>
</html>
