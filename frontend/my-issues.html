<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Issues — Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-brand"><i class="bi bi-bug"></i> Issue Tracker</a>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li><a href="projects.html"><i class="bi bi-folder"></i> Projects</a></li>
            <li><a href="my-issues.html" class="active"><i class="bi bi-list-check"></i> My Issues</a></li>
            <li><a href="admin.html" id="adminLink" style="display:none;"><i class="bi bi-shield-check"></i> Admin</a></li>
        </ul>
        <div class="sidebar-user">
            <div class="user-avatar" id="sidebarAvatar">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarName">Loading…</div>
                <div class="user-role" id="sidebarRole"></div>
            </div>
            <button class="btn-icon" onclick="logout()" title="Sign out"><i class="bi bi-box-arrow-right" style="color:#475569;"></i></button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <h1>My Issues</h1>
            <div class="d-flex gap-2">
                <button class="btn btn-sm" id="tabAssigned" onclick="showTab('assigned')" style="background:var(--primary); color:white; border:none; border-radius:5px; padding:.3rem .75rem; font-size:.8rem;">Assigned to Me</button>
                <button class="btn btn-sm" id="tabReported" onclick="showTab('reported')" style="background:none; border:1px solid var(--border); border-radius:5px; padding:.3rem .75rem; font-size:.8rem; color:var(--text-muted);">Reported by Me</button>
            </div>
        </div>
        <div class="page-body">
            <div class="card">
                <div class="card-body p-0">
                    <table class="issue-table w-100">
                        <thead>
                            <tr>
                                <th style="width:80px;">Type</th>
                                <th>Title</th>
                                <th style="width:100px;">Project</th>
                                <th style="width:110px;">Status</th>
                                <th style="width:90px;">Priority</th>
                                <th style="width:90px;">Created</th>
                            </tr>
                        </thead>
                        <tbody id="issuesBody">
                            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/my-issues.js"></script>
</body>
</html>
