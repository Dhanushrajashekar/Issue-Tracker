<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-right" style="min-height:100vh; width:100%;">
    <div class="auth-form-wrap">
        <a href="index.html" class="auth-logo"><i class="bi bi-bug"></i> Issue Tracker</a>
        <h2>Forgot password?</h2>
        <p class="subtitle">Enter your email and we'll send a reset link.</p>
        <div id="alert-area"></div>
        <form id="form" novalidate>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="you@company.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send reset link</button>
        </form>
        <p class="text-center mt-4" style="font-size:.875rem;"><a href="index.html" style="color:var(--primary);">Back to sign in</a></p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script>
    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await apiFetch('/api/auth/forgot-password', { method: 'POST', body: JSON.stringify({ email: document.getElementById('email').value.trim() }) });
            showAlert('alert-area', 'If that email is registered, a reset link has been sent.', 'success');
        } catch (err) { showAlert('alert-area', err.message); }
    });
</script>
</body>
</html>
