<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-brand"><i class="bi bi-bug"></i> Issue Tracker</a>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html" class="active"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li><a href="projects.html"><i class="bi bi-folder"></i> Projects</a></li>
            <li><a href="my-issues.html"><i class="bi bi-list-check"></i> My Issues</a></li>
            <li><a href="admin.html" id="adminLink" style="display:none;"><i class="bi bi-shield-check"></i> Admin</a></li>
        </ul>
        <div class="sidebar-user">
            <div class="user-avatar" id="sidebarAvatar">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarName">Loading…</div>
                <div class="user-role" id="sidebarRole"></div>
            </div>
            <button class="btn-icon" onclick="logout()" title="Sign out"><i class="bi bi-box-arrow-right" style="color:#475569;"></i></button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <h1>Dashboard</h1>
            <div class="d-flex align-items-center gap-2">
                <button class="notif-btn" id="notifBtn" title="Notifications">
                    <i class="bi bi-bell"></i>
                    <span class="badge d-none" id="notification-badge"></span>
                </button>
                <a href="projects.html" class="btn btn-primary btn-sm"><i class="bi bi-plus me-1"></i>New Project</a>
            </div>
        </div>

        <div class="page-body">
            <!-- Stat cards -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon indigo"><i class="bi bi-folder"></i></div>
                        <div><div class="stat-label">My Projects</div><div class="stat-value" id="statProjects">—</div></div>
                    </div>
                </div>
                <div class="col-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="bi bi-exclamation-circle"></i></div>
                        <div><div class="stat-label">Open Issues</div><div class="stat-value" id="statOpen">—</div></div>
                    </div>
                </div>
                <div class="col-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon amber"><i class="bi bi-person-check"></i></div>
                        <div><div class="stat-label">Assigned to Me</div><div class="stat-value" id="statAssigned">—</div></div>
                    </div>
                </div>
                <div class="col-6 col-xl-3">
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
                        <div><div class="stat-label">Resolved</div><div class="stat-value" id="statResolved">—</div></div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <!-- My projects -->
                <div class="col-lg-7">
                    <div class="card">
                        <div class="card-header">
                            <h5>My Projects</h5>
                            <a href="projects.html" class="btn btn-sm btn-outline-primary">View all</a>
                        </div>
                        <div class="card-body p-0" id="projectsList">
                            <div class="p-3 text-center text-muted"><div class="spinner-border spinner-border-sm"></div></div>
                        </div>
                    </div>
                </div>

                <!-- Assigned to me -->
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-header">
                            <h5>Assigned to Me</h5>
                            <a href="my-issues.html" class="btn btn-sm btn-outline-primary">View all</a>
                        </div>
                        <div class="card-body p-0" id="assignedList">
                            <div class="p-3 text-center text-muted"><div class="spinner-border spinner-border-sm"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="js/config.js"></script>
<script src="js/websocket.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
