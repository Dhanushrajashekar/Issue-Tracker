<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue — Issue Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-brand"><i class="bi bi-bug"></i> Issue Tracker</a>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li><a href="projects.html" class="active"><i class="bi bi-folder"></i> Projects</a></li>
            <li><a href="my-issues.html"><i class="bi bi-list-check"></i> My Issues</a></li>
            <li><a href="admin.html" id="adminLink" style="display:none;"><i class="bi bi-shield-check"></i> Admin</a></li>
        </ul>
        <div class="sidebar-user">
            <div class="user-avatar" id="sidebarAvatar">?</div>
            <div class="user-info">
                <div class="user-name" id="sidebarName">Loading…</div>
                <div class="user-role" id="sidebarRole"></div>
            </div>
            <button class="btn-icon" onclick="logout()" title="Sign out"><i class="bi bi-box-arrow-right" style="color:#475569;"></i></button>
        </div>
    </aside>

    <div class="main-content">
        <div class="topbar">
            <div id="topbarBreadcrumb" style="font-size:.85rem; color:var(--text-muted);">Loading…</div>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="watchBtn">
                    <i class="bi bi-eye me-1"></i><span id="watchBtnText">Watch</span>
                </button>
                <button class="btn btn-sm btn-outline-danger" id="deleteIssueBtn">
                    <i class="bi bi-trash me-1"></i>Delete
                </button>
            </div>
        </div>

        <div class="page-body">
            <div id="alert-area"></div>
            <div class="detail-layout" id="detailLayout" style="display:none;">

                <!-- Left: issue content -->
                <div>
                    <div class="mb-2 d-flex align-items-center gap-2 flex-wrap">
                        <span id="issueBadgeType"></span>
                        <span id="issueBadgePriority"></span>
                    </div>
                    <h2 id="issueTitle" style="font-size:1.35rem; font-weight:700; margin-bottom:.5rem;"></h2>
                    <div id="issueMeta" style="font-size:.8rem; color:var(--text-muted); margin-bottom:1.25rem;"></div>

                    <div class="card mb-3">
                        <div class="card-header"><h5>Description</h5></div>
                        <div class="card-body">
                            <p id="issueDescription" style="font-size:.9rem; white-space:pre-wrap; color:var(--text-muted);">No description provided.</p>
                        </div>
                    </div>

                    <!-- Attachments -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5>Attachments <span id="attachCount" class="text-muted" style="font-size:.8rem;"></span></h5>
                            <label class="btn btn-sm btn-outline-primary" style="cursor:pointer;">
                                <i class="bi bi-upload me-1"></i>Upload
                                <input type="file" id="fileInput" style="display:none;" multiple>
                            </label>
                        </div>
                        <div class="card-body p-0" id="attachmentsList">
                            <div class="empty-state"><i class="bi bi-paperclip"></i><p>No attachments yet</p></div>
                        </div>
                    </div>

                    <!-- Comments -->
                    <div class="card">
                        <div class="card-header"><h5>Comments <span id="commentCount" class="text-muted" style="font-size:.8rem;"></span></h5></div>
                        <div class="card-body">
                            <div id="commentsList"></div>
                            <div class="mt-3 pt-3" style="border-top:1px solid var(--border);">
                                <textarea class="form-control mb-2" id="commentInput" rows="3" placeholder="Add a comment… (watchers will be notified)"></textarea>
                                <button class="btn btn-sm btn-primary" id="submitComment">Post Comment</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: meta sidebar -->
                <div>
                    <div class="detail-meta-card mb-3">
                        <div style="font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:.75rem;">Details</div>

                        <div class="meta-row">
                            <span class="meta-label">Status</span>
                            <select class="form-select form-select-sm" id="statusSelect" style="width:auto; font-size:.78rem;">
                                <option value="OPEN">Open</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="IN_REVIEW">In Review</option>
                                <option value="RESOLVED">Resolved</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Priority</span>
                            <select class="form-select form-select-sm" id="prioritySelect" style="width:auto; font-size:.78rem;">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="HIGH">High</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Assignee</span>
                            <select class="form-select form-select-sm" id="assigneeSelect" style="width:auto; font-size:.78rem;">
                                <option value="">Unassigned</option>
                            </select>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Reporter</span>
                            <span id="reporterName" style="font-size:.8rem;"></span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Project</span>
                            <a id="projectLink" href="#" style="font-size:.8rem; color:var(--primary);"></a>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Created</span>
                            <span id="createdAt" style="font-size:.8rem;"></span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Updated</span>
                            <span id="updatedAt" style="font-size:.8rem;"></span>
                        </div>
                        <div class="mt-2">
                            <button class="btn btn-sm btn-primary w-100" id="saveChangesBtn">Save Changes</button>
                        </div>
                    </div>

                    <!-- Watchers -->
                    <div class="detail-meta-card">
                        <div style="font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:.75rem;">
                            Watchers <span id="watcherCount"></span>
                        </div>
                        <div id="watchersList" style="display:flex; flex-wrap:wrap; gap:.4rem;"></div>
                    </div>
                </div>
            </div>

            <div id="loadingState" class="text-center py-5 text-muted">
                <div class="spinner-border"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="js/config.js"></script>
<script src="js/websocket.js"></script>
<script src="js/issue-detail.js"></script>
</body>
</html>
