# ===================================================
# DEV PROFILE — H2 in-memory database
# No MySQL needed. Data resets on every restart.
#
# Run with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ===================================================

# H2 in-memory database — MODE=MySQL makes it behave like MySQL
# NON_KEYWORDS=VALUE prevents H2 from treating VALUE as a reserved SQL word
spring.datasource.url=jdbc:h2:mem:issue_tracker;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 browser console — open at http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:issue_tracker
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Show generated SQL in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email: point at a fake SMTP server so emails don't actually send
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=dev@localhost
spring.mail.password=dev
