# ===================================================
# PRODUCTION PROPERTIES — uses MySQL
# For local dev, use application-dev.properties instead:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ===================================================

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/issue_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword

# Hibernate: update = keep data between restarts, create-drop = wipe on restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT secret key — must be at least 256 bits (32 chars) for HS256
jwt.secret=myIssueTrackerSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity2024!
jwt.expiration=86400000

# Gmail SMTP — use an App Password (not your real password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-gmail-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL — used in email links (change to your domain in production)
app.frontend.url=http://localhost:3000

# File upload — max size for attachments
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Where to store uploaded files locally (relative to backend working dir)
app.upload.dir=uploads
